# =============================================================
# Project Configuration
# Edit this file when starting a new project — do not edit
# the notebooks or src modules directly for dataset-specific
# settings.
# =============================================================

# Target variable
target: "num"

# Columns to drop before modelling (IDs, irrelevant columns etc.)
drop_columns: []

# Missing value indicators specific to this dataset
# Note: common string indicators ("?", "name", "n/a" etc.) are
# handled automatically by load_raw_data.
# Only add numeric sentinels here that are valid in other datasets
# but represent missing values in this one.
na_values:
  - -9

# Train/test split
split:
  test_size: 0.2
  random_state: 42
  stratify: true

# Preprocessing pipeline
pipeline:
  scaler: "standard"       # options: standard, minmax, robust
  hashing_dim: 32
  feature_selection:
    variance_threshold: 0.0
    correlation_threshold: null
    protected_features: []

# Feature engineering
feature_engineering:
  interactions: false      # most useful for linear models
                           # tree models find interactions naturally
  polynomial: false        # most useful for linear models
                           # adds noise for tree-based models
  binning: false           # useful when numeric features have
                           # non-monotonic relationships with target
  aggregations: false      # useful when group statistics carry signal
  polynomial_degree: 2
  max_interaction_pairs: 20
  bin_numeric_cols: []
  n_bins: 5
  aggregation_groupby: []
  aggregation_targets: []

# Feature selection
feature_selection:
  mi_percentile: 50
  shap_percentile: 80

# Baseline models
baseline:
  run_all: true
  cv_folds: 5
  random_state: 42
  models:
    - logistic_regression
    - random_forest_classifier
    - xgboost_classifier

# Tuning
tuning:
  method: "optuna"
  n_trials: 50
  cv_folds: 5
  random_state: 42
  scoring: "roc_auc"
  models_to_tune:
    - xgboost_classifier

# Threshold tuning
threshold_tuning:
  metric: "f1"             # options: f1, f2, f3, precision, recall, accuracy
                           # f1 — balanced precision and recall, good default
                           # f2 — weights recall twice as heavily as precision
                           # f3 — weights recall three times as heavily as precision

  num_thresholds: 101
  min_samples_warning: 200  # warn if fewer samples than this for threshold tuning

# Target binarisation
# Some datasets have ordinal targets that need converting to binary
# Set to true if target values > 1 should be treated as positive class
binarise_target: false

# Feature type overrides
# By default the pipeline auto-detects ordinal vs nominal features
# Use these to explicitly override automatic detection
# ordinal: features that should be ordinal encoded (0, 1, 2...)
# nominal: features that should be one-hot encoded
feature_type_overrides:
  ordinal: []
  nominal: [] 